workflows:
  android-production:
    name: Android Production
    max_build_duration: 60
    instance_type: linux_x2
    working_directory: baby_monitor_native_app
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --release --flavor production
      - name: Build Android App Bundle
        script: flutter build appbundle --release --flavor production
    artifacts:
      - baby_monitor_native_app/build/app/outputs/flutter-apk/*.apk
      - baby_monitor_native_app/build/app/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - alonzo.zaldivar.29@gmail.com
        notify:
          success: true
          failure: true

  android-demo:
    name: Android Demo
    max_build_duration: 60
    instance_type: linux_x2
    working_directory: baby_monitor_native_app
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK Demo
        script: flutter build apk --release --flavor demo
    artifacts:
      - baby_monitor_native_app/build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - alonzo.zaldivar.29@gmail.com
        notify:
          success: true
          failure: true

  ios-production:
    name: iOS Production
    max_build_duration: 60
    instance_type: mac_mini_m1
    working_directory: baby_monitor_native_app
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install --repo-update
      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --flavor production \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - baby_monitor_native_app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - alonzo.zaldivar.29@gmail.com
        notify:
          success: true
          failure: true

  all-platforms:
    name: Build iOS & Android Production
    max_build_duration: 120
    instance_type: mac_mini_m1
    working_directory: baby_monitor_native_app
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --release --flavor production
      - name: Build Android App Bundle
        script: flutter build appbundle --release --flavor production
      - name: Install CocoaPods
        script: cd ios && pod install --repo-update
      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --flavor production \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - baby_monitor_native_app/build/app/outputs/flutter-apk/*.apk
      - baby_monitor_native_app/build/app/outputs/bundle/**/*.aab
      - baby_monitor_native_app/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - alonzo.zaldivar.29@gmail.com
        notify:
          success: true
          failure: true
