name: Build iOS & Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ========================================
  # BUILD ANDROID
  # ========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        
    - name: Get dependencies
      run: |
        cd baby_monitor_native_app
        flutter pub get
        
    - name: Build Android APK
      run: |
        cd baby_monitor_native_app
        flutter build apk --release
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: baby_monitor_native_app/build/app/outputs/flutter-apk/app-release.apk
        
  # ========================================
  # BUILD iOS
  # ========================================
  build-ios:
    name: Build iOS IPA
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        
    - name: Get dependencies
      run: |
        cd baby_monitor_native_app
        flutter pub get
        
    - name: Install CocoaPods dependencies
      run: |
        cd baby_monitor_native_app/ios
        pod install --repo-update
        
    - name: Build iOS (no code signing)
      run: |
        cd baby_monitor_native_app
        flutter build ios --release --no-codesign
        
    - name: Create IPA
      run: |
        cd baby_monitor_native_app
        mkdir -p build/ios/iphoneos
        cd build/ios/iphoneos
        mkdir Payload
        cp -r ../Release-iphoneos/Runner.app Payload/ || cp -r Runner.app Payload/ || true
        zip -r app-unsigned.ipa Payload
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa-unsigned
        path: baby_monitor_native_app/build/ios/iphoneos/app-unsigned.ipa
